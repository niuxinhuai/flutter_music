name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rewrite GitHub SSH dependencies to HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        shell: bash
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee analyze.log
          analyze_status=${PIPESTATUS[0]}
          set -e

          if grep -E '^[[:space:]]*error[[:space:]]+•' analyze.log; then
            exit 1
          fi

          if [ "$analyze_status" -ne 0 ] && ! grep -Eq '^[[:space:]]*[0-9]+ issues? found' analyze.log; then
            exit "$analyze_status"
          fi

          if [ "$analyze_status" -ne 0 ]; then
            echo "flutter analyze exited with $analyze_status without analyzer errors; continuing because infos/warnings are non-fatal."
          fi

      - name: Test
        run: flutter test

      - name: Build Android APK
        run: flutter build apk --release
