name: flutter_music
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.11.5 <4.0.0"
  flutter: ">=3.41.9"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

    #网络
  dio: ^4.0.6

#  flutter_pdfview: ^1.2.0
  path_provider: ^2.1.5

  extended_list: ^3.0.2
  extended_image: ^10.0.1

  flutter_staggered_grid_view: ^0.7.0

    #本地key-value缓存
  shared_preferences: ^2.5.3

    #接口缓存
  dio_http_cache: ^0.3.0

  #sqflite
  sqflite: ^2.4.2

  video_player: ^2.10.1

    #文件路径操作
  path: ^1.9.0

  event_bus: ^2.0.1

    #下拉刷新
  pull_to_refresh: ^2.0.0

#  hello:
#    path: /Users/niuxinhuai/Desktop/plugin_test/hello

    #json库
  json_annotation: ^4.9.0

    #图片缓存
  cached_network_image: ^3.4.1

    #图片浏览
  photo_view: ^0.15.0

  fish_redux: ^0.3.7

  webview_flutter: ^4.13.0

  #卡片切换
  card_swiper: ^3.0.1

  encrypt: ^5.0.3

  #拖动组件
  reorderables: ^0.6.0

  #音频播放器
  audioplayers: ^6.6.0

  #国际化、日期等
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  #自动生成代码
  source_gen: ^2.0.0
  #自动生成代码
  build_runner: ^2.5.4
  #json解析
  json_serializable: ^6.9.5


dependency_overrides:
  # dio_http_cache 的 git 版本仍声明 json_serializable ^5.0.0，
  # Flutter 3.41.9 / Dart 3.11.5 下统一使用新版代码生成链。
  json_serializable: ^6.9.5

  #接口缓存，等这个库的json_serializable依赖更新到6.x再切回来
  dio_http_cache:
    git: git@github.com:uquabc/dio-http-cache.git

  fish_redux:
    git: git@github.com:leftcoding/fish-redux.git
# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  fonts:
    - family: iconfont
      fonts:
        - asset: assets/fonts/iconfont.ttf

  assets:
    - assets/images/
    - assets/json/
